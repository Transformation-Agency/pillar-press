name: macOS notarized release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-macos:
    name: Build ${{ matrix.label }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Apple Silicon
            target: aarch64-apple-darwin
            suffix: aarch64
            node_arch: arm64
            osx_arch: arm64
            whisper_flags: ""
          - label: Intel
            target: x86_64-apple-darwin
            suffix: x64
            node_arch: x64
            osx_arch: x86_64
            whisper_flags: >-
              -DGGML_METAL=OFF
              -DGGML_AVX=OFF
              -DGGML_AVX2=OFF
              -DGGML_FMA=OFF
              -DGGML_F16C=OFF
              -DGGML_BMI2=OFF

    env:
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      CARGO_BUILD_TARGET: ${{ matrix.target }}
      MACOSX_DEPLOYMENT_TARGET: "12.0"
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      npm_config_arch: ${{ matrix.node_arch }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Provide x64 Node sidecar
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          set -euo pipefail
          node_version="$(node -p 'process.version.slice(1)')"
          curl -fsSL "https://nodejs.org/dist/v${node_version}/node-v${node_version}-darwin-x64.tar.gz" -o "$RUNNER_TEMP/node-x64.tgz"
          tar -xzf "$RUNNER_TEMP/node-x64.tgz" -C "$RUNNER_TEMP"
          node_x64="$RUNNER_TEMP/node-v${node_version}-darwin-x64/bin/node"
          test "$(file -b "$node_x64" | grep -c x86_64)" = "1"
          echo "PILLAR_PRESS_NODE_SIDECAR_PATH=$node_x64" >> "$GITHUB_ENV"

      - name: Build static whisper-cli
        run: |
          set -euo pipefail
          git clone --depth 1 --branch v1.8.5 https://github.com/ggml-org/whisper.cpp.git "$RUNNER_TEMP/whisper.cpp"
          cmake -S "$RUNNER_TEMP/whisper.cpp" -B "$RUNNER_TEMP/whisper-build" \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.osx_arch }} \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_NATIVE=OFF \
            -DWHISPER_BUILD_TESTS=OFF \
            -DWHISPER_BUILD_SERVER=OFF \
            ${{ matrix.whisper_flags }}
          cmake --build "$RUNNER_TEMP/whisper-build" -j4 --target whisper-cli
          whisper_cli="$RUNNER_TEMP/whisper-build/bin/whisper-cli"
          whisper_model="$RUNNER_TEMP/ggml-tiny.en.bin"
          cp "src-tauri/resources/whisper/models/ggml-tiny.en.bin" "$whisper_model"
          otool -L "$whisper_cli"
          echo "PILLAR_PRESS_WHISPER_BIN=$whisper_cli" >> "$GITHUB_ENV"
          echo "PILLAR_PRESS_WHISPER_MODEL=$whisper_model" >> "$GITHUB_ENV"

      - name: Decode Apple signing certificate
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$APPLE_CERTIFICATE_P12_BASE64"
          test -n "$APPLE_CERTIFICATE_PASSWORD"
          test -n "$KEYCHAIN_PASSWORD"
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/apple-cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import "$RUNNER_TEMP/apple-cert.p12" -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Write CI signing config
        run: |
          node -e 'const fs=require("fs"); const id=process.env.APPLE_SIGNING_IDENTITY; if (!id) throw new Error("Missing APPLE_SIGNING_IDENTITY"); fs.writeFileSync("src-tauri/tauri.ci.conf.json", JSON.stringify({ bundle: { macOS: { signingIdentity: id, hardenedRuntime: true, minimumSystemVersion: "12.0" } } }, null, 2));'

      - name: Build signed DMG
        run: npm run desktop:build -- --target "${{ matrix.target }}" --config src-tauri/tauri.ci.conf.json

      - name: Notarize and staple DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          dmg="$(find "src-tauri/target/${{ matrix.target }}/release/bundle/dmg" -name '*.dmg' -print -quit)"
          test -n "$dmg"
          submit_json="$RUNNER_TEMP/notary-submit-${{ matrix.suffix }}.json"
          xcrun notarytool submit "$dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json | tee "$submit_json"
          submission_id="$(node -e 'const fs=require("fs"); const data=JSON.parse(fs.readFileSync(process.argv[1], "utf8")); console.log(data.id || "")' "$submit_json")"
          submission_status="$(node -e 'const fs=require("fs"); const data=JSON.parse(fs.readFileSync(process.argv[1], "utf8")); console.log(data.status || "")' "$submit_json")"
          if [ "$submission_status" != "Accepted" ]; then
            echo "Notarization failed with status: $submission_status"
            if [ -n "$submission_id" ]; then
              xcrun notarytool log "$submission_id" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" || true
            fi
            exit 1
          fi
          xcrun stapler staple "$dmg"
          xcrun stapler validate "$dmg"

      - name: Prepare release assets
        run: |
          set -euo pipefail
          version="$(node -p 'require("./package.json").version')"
          mkdir -p release
          dmg="$(find "src-tauri/target/${{ matrix.target }}/release/bundle/dmg" -name '*.dmg' -print -quit)"
          asset="release/Pillar.Press_${version}_${{ matrix.suffix }}.dmg"
          cp "$dmg" "$asset"
          shasum -a 256 "$asset" > "${asset}.sha256"
          updater_archive="$(find "src-tauri/target/${{ matrix.target }}/release/bundle/macos" -name '*.app.tar.gz' -print -quit)"
          test -n "$updater_archive"
          updater_sig="${updater_archive}.sig"
          test -f "$updater_sig"
          updater_asset="release/Pillar.Press_${version}_${{ matrix.suffix }}.app.tar.gz"
          cp "$updater_archive" "$updater_asset"
          cp "$updater_sig" "${updater_asset}.sig"
          ls -lh release

      - uses: actions/upload-artifact@v4
        with:
          name: pillar-press-macos-${{ matrix.suffix }}
          path: release/*
          if-no-files-found: error

      - name: Upload assets to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          fail_on_unmatched_files: true
