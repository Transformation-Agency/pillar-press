name: Desktop CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

concurrency:
  group: desktop-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  desktop-local-first:
    name: Local-first desktop gates
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci --include=dev --include=optional --include=peer

      - name: Audit npm dependencies
        run: npm audit --audit-level=moderate

      - name: Typecheck
        run: npm run typecheck

      - name: Run Vitest
        run: npm test

      - name: Prepare desktop server resources
        run: npm run desktop:web:build

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Check release readiness tracker
        run: npm run desktop:release-readiness

      - name: Verify onboarding runtime
        run: npm run onboarding:verify

      - name: Verify browser onboarding shell
        run: npm run onboarding:verify:browser

      - name: Build desktop app
        run: npm run desktop:build

      - name: Verify desktop release
        run: npm run desktop:verify-release
