[[permission]]
identifier = "desktop-setup"
description = "Allows the main Pillar Press window to manage local setup, model settings, backups, and desktop runtime status."
commands.allow = [
  "ollama_status",
  "start_ollama_service",
  "open_ollama_download",
  "open_external_url",
  "list_ollama_models",
  "pull_ollama_model",
  "save_model_choice",
  "save_llm_settings",
  "save_media_provider_key",
  "get_model_choice",
  "init_local_database",
  "create_local_backup",
  "desktop_runtime_status",
  "start_voice_session",
  "speak_text",
  "stop_voice_session",
]
